    <script>
        const hamburgerBtn = document.querySelector('.hamburger');
        const dropdownMenu = document.querySelector('.hamburger-dropdown');

        // Toggle menu when clicking the icon
        hamburgerBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Prevents the window click from firing immediately
            dropdownMenu.classList.toggle('active');
        });

        // Close menu if user clicks anywhere else on the screen
        window.addEventListener('click', () => {
            if (dropdownMenu.classList.contains('active')) {
                dropdownMenu.classList.remove('active');
            }
        });

        const searchInput = document.getElementById("bar3");
        // We select the container divs so we can hide the whole card (image + name)
        const artistCards = document.querySelectorAll(".band-artists > div");

        searchInput.addEventListener("input", (e) => {
            const search = e.target.value.toLowerCase();

            artistCards.forEach(card => {
                // Find the paragraph text inside this specific card
                const nameElement = card.querySelector(".artist-name");
                const artistName = nameElement.textContent.toLowerCase();

                // Check if the search string exists in the name
                if (artistName.includes(search)) {
                    card.style.display = "block"; // Show the card
                } else {
                    card.style.display = "none";  // Hide the card
                }
            });
        });

    </script>
